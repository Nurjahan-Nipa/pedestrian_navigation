<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFT Annotator v20</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 13px; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#toolbar {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  padding: 6px 10px; background: #2a2a2a; border-bottom: 1px solid #444; flex-shrink: 0;
}
#toolbar label { color: #aaa; }
.tab { padding: 3px 9px; border-radius: 4px; cursor: pointer; background: #3a3a3a; border: 1px solid #555; color: #ccc; }
.tab.active { background: #2060c0; border-color: #4080e0; color: #fff; }
.mode-btn { padding: 3px 9px; border-radius: 4px; cursor: pointer; background: #3a3a3a; border: 1px solid #555; color: #ccc; font-family: monospace; font-size: 13px; }
.mode-btn.active { background: #206020; border-color: #40a040; color: #fff; }
.mode-btn.del.active { background: #802020; border-color: #c04040; }
.action-btn { padding: 3px 10px; border-radius: 4px; cursor: pointer; background: #404040; border: 1px solid #666; color: #ddd; font-family: monospace; font-size: 13px; }
.action-btn.primary { background: #205090; border-color: #4080d0; color: #fff; }
#action-btns { margin-left: auto; display: flex; gap: 4px; }

#main { display: flex; flex: 1; overflow: hidden; }
#map-area { flex: 1; overflow: hidden; position: relative; background: #111; cursor: crosshair; }
#map-container { position: absolute; transform-origin: 0 0; }
#map-img { display: block; max-width: none; user-select: none; }
#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

#sidebar { width: 280px; background: #222; border-left: 1px solid #444; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
#sidebar-tabs { display: flex; flex-shrink: 0; border-bottom: 1px solid #444; }
.stab { flex: 1; padding: 6px; text-align: center; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
.stab.active { color: #ddd; border-bottom-color: #4080e0; }

/* Each panel fills the sidebar — only one shown at a time */
.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }

/* nodes panel */
#node-list { flex: 1; overflow-y: auto; padding: 6px; min-height: 0; }
.node-item { padding: 4px 6px; margin-bottom: 3px; border-radius: 3px; border: 1px solid #444; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.node-item:hover { background: #2a2a2a; }
.node-item.selected { border-color: #4080e0; background: #1a2a40; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-door { background: #378ADD; } .dot-corridor { background: #1D9E75; }
.dot-stair { background: #D85A30; } .dot-elevator { background: #9B59B6; }
.dot-anchor { background: #F39C12; }
.node-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.node-typ { color: #555; font-size: 11px; }

#node-form { padding: 8px; background: #1a1a1a; border-top: 1px solid #444; flex-shrink: 0; }
#node-form .fl { color: #888; font-size: 11px; margin: 5px 0 2px; display: block; }
#node-form input { width: 100%; padding: 3px 6px; background: #2a2a2a; border: 1px solid #555; color: #ddd; border-radius: 3px; font-family: monospace; font-size: 12px; }
#btn-save-node { margin-top: 7px; width: 100%; padding: 5px; background: #205090; border: 1px solid #4080d0; color: #fff; border-radius: 3px; cursor: pointer; font-family: monospace; }

/* edges panel */
#edge-list { padding: 6px; overflow-y: auto; }
.edge-header { color: #666; font-size: 11px; padding: 4px 2px 6px; }
.edge-item { padding: 3px 6px; margin-bottom: 3px; border-radius: 3px; border: 1px solid #444; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
.edge-del { color: #c04040; cursor: pointer; padding: 0 4px; }
.edge-del:hover { color: #ff6060; }

/* export panel */
#panel-export { padding: 8px; overflow-y: auto; }
#export-area { width: 100%; height: 180px; background: #111; border: 1px solid #444; color: #8fc; font-family: monospace; font-size: 11px; padding: 6px; resize: none; border-radius: 3px; }
#rooms-area { width: 100%; height: 130px; background: #111; border: 1px solid #444; color: #8cf; font-family: monospace; font-size: 11px; padding: 6px; resize: none; border-radius: 3px; margin-top: 4px; }
.exp-lbl { color: #888; font-size: 11px; margin: 8px 0 3px; }

#status { padding: 3px 10px; background: #1a1a1a; border-top: 1px solid #444; color: #666; font-size: 11px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="toolbar">
  <label>Floor:</label>
  <div style="display:flex;gap:4px" id="floor-tabs">
    <div class="tab active" data-floor="1">1F</div>
    <div class="tab" data-floor="2">2F</div>
    <div class="tab" data-floor="3">3F</div>
  </div>
  <span id="img-status" style="color:#666;font-size:11px;margin-left:8px">Loading floor 1…</span>
  <span style="color:#555;font-size:11px;margin-left:8px">v20</span>
  <label style="margin-left:4px">Mode:</label>
  <div style="display:flex;gap:3px">
    <button class="mode-btn active" data-mode="door">Door</button>
    <button class="mode-btn" data-mode="corridor">Corridor</button>
    <button class="mode-btn" data-mode="stair">Stair</button>
    <button class="mode-btn" data-mode="elevator">Elevator</button>
    <button class="mode-btn" data-mode="anchor">Anchor</button>
    <button class="mode-btn" data-mode="edge">Edge</button>
    <button class="mode-btn" data-mode="move">Move</button>
    <button class="mode-btn del" data-mode="delete">Delete</button>
    <button class="mode-btn del" data-mode="deledge">Del Edges</button>
  </div>
  <div id="action-btns">
    <button class="action-btn" id="btn-undo">Undo</button>
    <button class="action-btn" id="btn-clear">Clear Floor</button>
    <button class="action-btn" id="btn-clear-edges">Clear Edges</button>
    <label class="action-btn" style="cursor:pointer">Import JSON<input type="file" id="json-upload" accept=".json" style="display:none"></label>
    <button class="action-btn" id="btn-autoconnect">Auto-connect</button>
    <input type="number" id="thresh-cc" value="0.04" step="0.005" min="0.005" max="0.2" style="width:64px;padding:4px 6px;background:#2a2a2a;border:1px solid #555;color:#ddd;border-radius:3px;font-family:monospace;font-size:14px" title="max distance (all types)">
    <button class="action-btn" id="btn-check-dupes">Check Dupes</button>
    <button class="action-btn" id="btn-check-isolated">Check Isolated</button>
    <button class="action-btn primary" id="btn-export">Export JSON</button>
  </div>
</div>

<div id="main">
  <div id="map-area">
    <div id="map-container">
      <img id="map-img" src="" alt="">
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-tabs">
      <div class="stab active" data-panel="nodes">Nodes</div>
      <div class="stab" data-panel="edges">Edges</div>
      <div class="stab" data-panel="export">Export</div>
    </div>

    <div id="panel-nodes" class="panel active">
      <div id="node-list"></div>
      <div id="node-form">
        <span class="fl">ID</span><input id="form-id" placeholder="e.g. w_d1_1340">
        <span class="fl">Label</span><input id="form-label" placeholder="e.g. Capstone Design Space">
        <span class="fl">Room ID (door only)</span><input id="form-room" placeholder="e.g. 1340">
        <button id="btn-save-node">Save</button>
        <div id="coord-display" style="margin-top:6px;text-align:right;color:#555;font-size:11px">—</div>
      </div>
    </div>

    <div id="panel-edges" class="panel">
      <div id="edge-list"></div>
    </div>

    <div id="panel-export" class="panel">
      <div class="exp-lbl">graph.json</div>
      <textarea id="export-area" readonly></textarea>
      <button class="action-btn primary" id="btn-dl-graph" style="width:100%;margin-top:5px">Download graph.json</button>
      <button class="action-btn primary" id="btn-dl-rooms" style="width:100%;margin-top:5px">Download rooms.json</button>
      <div class="exp-lbl">rooms.json template</div>
      <textarea id="rooms-area" readonly></textarea>
    </div>
  </div>
</div>

<div id="status">Load a map image to begin. Scroll=zoom, right-drag=pan.</div>

<script>
const COLORS = {door:'#378ADD',corridor:'#1D9E75',stair:'#D85A30',elevator:'#9B59B6',anchor:'#F39C12'};
const RADIUS  = {door:7,corridor:5,stair:10,elevator:10,anchor:9};

const S = {
  floor:1, mode:'door',
  nodes:{1:[],2:[],3:[]}, edges:{1:[],2:[],3:[]},
  sel:null, edgeStart:null,
  scale:1, panX:0, panY:0, imgW:1, imgH:1,
  history:[], moveDrag:false, moveNode:null,
};

const $ = id => document.getElementById(id);
const mapImg   = $('map-img');
const canvas   = $('overlay');
const ctx      = canvas.getContext('2d');
const mapArea  = $('map-area');
const mapCont  = $('map-container');
const nodeList = $('node-list');
const edgeList = $('edge-list');

// ── Panel switching ────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  $('panel-'+name).classList.add('active');
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.stab[data-panel="${name}"]`).classList.add('active');
}

$('sidebar-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.stab');
  if (!tab) return;
  const name = tab.dataset.panel;
  showPanel(name);
  if (name === 'nodes') renderNodeList();
  else if (name === 'edges') renderEdgeList();
  else buildExport();
});

// ── Floor tabs ─────────────────────────────────────────────────
$('floor-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('#floor-tabs .tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  S.floor = +tab.dataset.floor;
  S.sel = null; S.edgeStart = null;
  loadFloorImg(S.floor, () => { renderNodeList(); renderEdgeList(); redraw(); });
  st(`Floor ${S.floor} — ${S.nodes[S.floor].length} nodes`);
});

// ── Mode buttons ───────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.mode = btn.dataset.mode;
    S.edgeStart = null; redraw();
  });
});

// ── Image ──────────────────────────────────────────────────────
const FLOOR_IMGS = { 1:'./assets/floor1.png', 2:'./assets/floor2.png', 3:'./assets/floor3.png' };

function loadFloorImg(floor, onDone) {
  const src = FLOOR_IMGS[floor];
  const statusEl = $('img-status');
  if (statusEl) statusEl.textContent = `Loading floor ${floor}…`;
  mapImg.onload = () => {
    S.imgW = mapImg.naturalWidth; S.imgH = mapImg.naturalHeight;
    canvas.width = S.imgW; canvas.height = S.imgH;
    const aw = mapArea.clientWidth, ah = mapArea.clientHeight;
    S.scale = Math.min(aw/S.imgW, ah/S.imgH) * 0.97;
    S.panX = (aw - S.imgW*S.scale)/2; S.panY = (ah - S.imgH*S.scale)/2;
    applyT(); redraw();
    if (statusEl) statusEl.textContent = `floor${floor}.png (${S.imgW}×${S.imgH})`;
    if (onDone) onDone();
  };
  mapImg.onerror = () => {
    if (statusEl) statusEl.textContent = `floor${floor}.png not found`;
    st(`Could not load ${src} — check assets/ folder`);
  };
  mapImg.src = src;
}

function applyT() {
  mapCont.style.transform = `translate(${S.panX}px,${S.panY}px) scale(${S.scale})`;
  mapCont.style.transformOrigin = '0 0';
}
function s2n(sx,sy) {
  const r = mapArea.getBoundingClientRect();
  return { nx:((sx-r.left)-S.panX)/S.scale/S.imgW, ny:((sy-r.top)-S.panY)/S.scale/S.imgH };
}
function n2c(nx,ny) { return {x:nx*S.imgW, y:ny*S.imgH}; }
function hitNode(nx,ny) {
  const nodes = S.nodes[S.floor];
  for (let i=nodes.length-1; i>=0; i--) {
    const n=nodes[i], dx=(n.nx-nx)*S.imgW, dy=(n.ny-ny)*S.imgH;
    if (dx*dx+dy*dy < (RADIUS[n.type]+5)**2) return n;
  }
  return null;
}

// ── Pointer events ─────────────────────────────────────────────
mapArea.addEventListener('pointerdown', e => {
  if (e.button===2) return;
  const {nx,ny} = s2n(e.clientX, e.clientY);
  if (S.mode==='move')   { const h=hitNode(nx,ny); if(h){S.moveDrag=true;S.moveNode=h;selectNode(h);} return; }
  if (S.mode==='delete') { const h=hitNode(nx,ny); if(h) delNode(h); return; }
  if (S.mode==='deledge') {
    const h=hitNode(nx,ny); if(!h) return;
    const before = S.edges[S.floor].length;
    pushH();
    S.edges[S.floor] = S.edges[S.floor].filter(([a,b]) => a!==h.id && b!==h.id);
    const removed = before - S.edges[S.floor].length;
    renderEdgeList(); redraw();
    st(`Removed ${removed} edge${removed!==1?'s':''} from "${h.id}"`);
    return;
  }
  if (S.mode==='edge') {
    const h=hitNode(nx,ny); if(!h) return;
    if (!S.edgeStart) { S.edgeStart=h; redraw(); st(`Edge from "${h.id}" — click target`); }
    else { if(S.edgeStart.id!==h.id) addEdge(S.edgeStart.id,h.id); S.edgeStart=null; redraw(); }
    return;
  }
  if (nx<0||nx>1||ny<0||ny>1) return;
  pushH();
  const id=mkId(S.mode);
  const node={id,type:S.mode,floor:S.floor,nx,ny,label:'',roomId:''};
  S.nodes[S.floor].push(node);
  selectNode(node); renderNodeList(); redraw();
  st(`Placed ${S.mode} "${id}"`);
});

mapArea.addEventListener('pointermove', e => {
  if (S.moveDrag && S.moveNode) {
    const {nx,ny}=s2n(e.clientX,e.clientY);
    S.moveNode.nx=Math.max(0,Math.min(1,nx)); S.moveNode.ny=Math.max(0,Math.min(1,ny));
    redraw();
  }
  if (S.mode==='edge' && S.edgeStart) redraw(e);
});

mapArea.addEventListener('pointerup', () => {
  if (S.moveDrag) {
    $('coord-display').textContent=`nx=${S.moveNode.nx.toFixed(4)}  ny=${S.moveNode.ny.toFixed(4)}`;
  st(`Moved "${S.moveNode.id}" → (${S.moveNode.nx.toFixed(4)},${S.moveNode.ny.toFixed(4)})`);
    S.moveDrag=false; S.moveNode=null;
  }
});

// pan
let panSt=null, panOr=null;
mapArea.addEventListener('mousedown', e => { if(e.button!==2)return; panSt={x:e.clientX,y:e.clientY}; panOr={x:S.panX,y:S.panY}; });
mapArea.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mousemove', e => { if(!panSt)return; S.panX=panOr.x+e.clientX-panSt.x; S.panY=panOr.y+e.clientY-panSt.y; applyT(); });
window.addEventListener('mouseup', e => { if(e.button===2) panSt=null; });
mapArea.addEventListener('wheel', e => {
  e.preventDefault(); const f=e.deltaY<0?1.1:0.91;
  const r=mapArea.getBoundingClientRect(), cx=e.clientX-r.left, cy=e.clientY-r.top;
  S.panX=cx-(cx-S.panX)*f; S.panY=cy-(cy-S.panY)*f; S.scale*=f; applyT();
},{passive:false});

let lastT=null;
mapArea.addEventListener('touchstart',e=>{lastT=tc(e);},{passive:true});
mapArea.addEventListener('touchmove',e=>{
  e.preventDefault(); const cur=tc(e);
  if(cur.length===1&&lastT?.length===1){S.panX+=cur[0].x-lastT[0].x;S.panY+=cur[0].y-lastT[0].y;}
  else if(cur.length>=2&&lastT?.length>=2){
    const pd=hd(lastT[0],lastT[1]),cd=hd(cur[0],cur[1]),f=cd/pd;
    const r=mapArea.getBoundingClientRect();
    const cx=(cur[0].x+cur[1].x)/2-r.left,cy=(cur[0].y+cur[1].y)/2-r.top;
    S.panX=cx-(cx-S.panX)*f; S.panY=cy-(cy-S.panY)*f; S.scale*=f;
    S.panX+=(cur[0].x+cur[1].x)/2-(lastT[0].x+lastT[1].x)/2;
    S.panY+=(cur[0].y+cur[1].y)/2-(lastT[0].y+lastT[1].y)/2;
  }
  lastT=cur; applyT();
},{passive:false});
mapArea.addEventListener('touchend',()=>{lastT=null;});
function tc(e){return Array.from(e.touches).map(t=>({x:t.clientX,y:t.clientY}));}
function hd(a,b){return Math.hypot(b.x-a.x,b.y-a.y);}

// ── Node ops ───────────────────────────────────────────────────
const ctrs={};
function mkId(type){ctrs[type]=(ctrs[type]||0)+1;return `w_${type[0]}${S.floor}_${ctrs[type]}`;}
function syncCtrs() {
  // After import: advance counters past all existing node ids so new nodes never collide
  // id format: w_{typeChar}{floor}_{n}  e.g. w_d1_7, w_c2_13
  [1,2,3].flatMap(f => S.nodes[f]).forEach(n => {
    const m = n.id.match(/^w_([a-z]+)\d+_(\d+)$/);
    if (!m) return;
    // match type by first char of type name
    const typeChar = m[1][0];
    const num = parseInt(m[2]);
    const type = Object.keys(ctrs).find(t => t[0]===typeChar)
               || ['door','corridor','stair','elevator','anchor'].find(t => t[0]===typeChar);
    if (type) ctrs[type] = Math.max(ctrs[type]||0, num);
  });
}

function delNode(n) {
  pushH();
  S.nodes[S.floor]=S.nodes[S.floor].filter(x=>x.id!==n.id);
  S.edges[S.floor]=S.edges[S.floor].filter(([a,b])=>a!==n.id&&b!==n.id);
  if(S.sel?.id===n.id) S.sel=null;
  renderNodeList(); renderEdgeList(); redraw(); st(`Deleted "${n.id}"`);
}

function addEdge(aid,bid) {
  if(S.edges[S.floor].some(([a,b])=>(a===aid&&b===bid)||(a===bid&&b===aid))){st('Edge exists');return;}
  pushH(); S.edges[S.floor].push([aid,bid]); renderEdgeList(); st(`${aid} ↔ ${bid}`);
}

function selectNode(n) {
  S.sel=n;
  $('form-id').value=n.id; $('form-label').value=n.label||''; $('form-room').value=n.roomId||'';
  $('coord-display').textContent=`nx=${n.nx.toFixed(4)}  ny=${n.ny.toFixed(4)}`;
  renderNodeList();
}

$('btn-save-node').addEventListener('click',()=>{
  if(!S.sel) return;
  const newId=$('form-id').value.trim(), oldId=S.sel.id;
  if(newId&&newId!==oldId){
    S.edges[S.floor]=S.edges[S.floor].map(([a,b])=>[a===oldId?newId:a,b===oldId?newId:b]);
    S.sel.id=newId;
  }
  S.sel.label=$('form-label').value.trim(); S.sel.roomId=$('form-room').value.trim();
  renderNodeList(); redraw(); st(`Saved "${S.sel.id}"`);
});

// ── History ────────────────────────────────────────────────────
function pushH(){S.history.push(JSON.stringify({n:S.nodes,e:S.edges}));if(S.history.length>60)S.history.shift();}
$('btn-undo').addEventListener('click',()=>{
  if(!S.history.length) return;
  const p=JSON.parse(S.history.pop()); S.nodes=p.n; S.edges=p.e; S.sel=null;
  renderNodeList(); renderEdgeList(); redraw(); st('Undo');
});
$('btn-clear').addEventListener('click',()=>{
  if(!confirm(`Clear floor ${S.floor}?`)) return;
  pushH(); S.nodes[S.floor]=[]; S.edges[S.floor]=[]; S.sel=null;
  renderNodeList(); renderEdgeList(); redraw();
});
$('btn-clear-edges').addEventListener('click',()=>{
  if(!S.edges[S.floor].length) { st('No edges on this floor'); return; }
  if(!confirm(`Delete all ${S.edges[S.floor].length} edges on floor ${S.floor}?`)) return;
  pushH(); S.edges[S.floor]=[];
  renderEdgeList(); redraw();
  st(`Cleared all edges on floor ${S.floor}`);
});

// ── Draw ───────────────────────────────────────────────────────
function redraw(moveEvt) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const nodes=S.nodes[S.floor], edges=S.edges[S.floor];
  const nm=Object.fromEntries(nodes.map(n=>[n.id,n]));

  ctx.strokeStyle='rgba(255,230,50,0.6)'; ctx.lineWidth=2;
  edges.forEach(([a,b])=>{
    const na=nm[a],nb=nm[b]; if(!na||!nb) return;
    const pa=n2c(na.nx,na.ny),pb=n2c(nb.nx,nb.ny);
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  });

  if(S.edgeStart && moveEvt) {
    const pa=n2c(S.edgeStart.nx,S.edgeStart.ny);
    const {nx,ny}=s2n(moveEvt.clientX,moveEvt.clientY), pb=n2c(nx,ny);
    ctx.strokeStyle='rgba(255,200,0,0.8)'; ctx.setLineDash([6,4]); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  nodes.forEach(n=>{
    const {x,y}=n2c(n.nx,n.ny), r=RADIUS[n.type]||6;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=COLORS[n.type]||'#888'; ctx.fill();
    if(S.sel?.id===n.id||S.edgeStart?.id===n.id){
      ctx.beginPath(); ctx.arc(x,y,r+4,0,Math.PI*2);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    }
    // Labels: door shows roomId, stair/elevator/anchor show short id, corridor silent
    let lbl = '';
    if (n.type==='door' && n.roomId) lbl = n.roomId;
    else if (n.type==='stair' || n.type==='elevator' || n.type==='anchor') lbl = n.id.replace(/^w_/,'').slice(0,10);
    // Always show label for selected node
    if (S.sel?.id===n.id) lbl = n.roomId || n.id;
    if(lbl){
      ctx.font='bold 10px monospace'; ctx.textAlign='center';
      ctx.fillStyle='#fff'; ctx.strokeStyle='rgba(0,0,0,0.7)';
      ctx.lineWidth=2; ctx.strokeText(lbl,x,y-r-3); ctx.fillText(lbl,x,y-r-3);
    }
  });
}

// ── Render lists ───────────────────────────────────────────────
const TYPE_ORDER = {stair:0, elevator:1, anchor:2, door:3, corridor:4};
function renderNodeList() {
  const nodes = [...S.nodes[S.floor]].sort((a,b) => {
    const td = (TYPE_ORDER[a.type]??9) - (TYPE_ORDER[b.type]??9);
    if (td !== 0) return td;
    return a.id.localeCompare(b.id, undefined, {numeric:true, sensitivity:'base'});
  });
  nodeList.innerHTML = nodes.length===0
    ? '<div style="color:#555;padding:8px">No nodes on this floor</div>'
    : nodes.map(n=>`
      <div class="node-item${S.sel?.id===n.id?' selected':''}" data-id="${n.id}">
        <div class="dot dot-${n.type}"></div>
        <div class="node-lbl">${n.label||n.id}</div>
        <div class="node-typ">${n.type}</div>
      </div>`).join('');
  nodeList.querySelectorAll('.node-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=S.nodes[S.floor].find(x=>x.id===el.dataset.id);
      if(n){selectNode(n);redraw();}
    });
  });
}

function renderEdgeList() {
  const edges=S.edges[S.floor];
  edgeList.innerHTML=`<div class="edge-header">${edges.length} edges — floor ${S.floor}</div>`
    +(edges.length===0
      ? '<div style="color:#555;padding:4px 6px">No edges yet</div>'
      : edges.map(([a,b],i)=>`
        <div class="edge-item">
          <span>${a} ↔ ${b}</span>
          <span class="edge-del" data-i="${i}">✕</span>
        </div>`).join(''));
  edgeList.querySelectorAll('.edge-del').forEach(el=>{
    el.addEventListener('click',()=>{pushH();S.edges[S.floor].splice(+el.dataset.i,1);renderEdgeList();redraw();});
  });
}

// ── Import ─────────────────────────────────────────────────────
$('json-upload').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const raw=JSON.parse(ev.target.result);
      if(!Array.isArray(raw)){alert('Expected JSON array');return;}
      pushH();
      S.nodes={1:[],2:[],3:[]}; S.edges={1:[],2:[],3:[]};
      const floorOf={};
      raw.forEach(n=>{if([1,2,3].includes(n.floor)) floorOf[n.id]=n.floor;});
      raw.forEach(n=>{
        const f=n.floor; if(![1,2,3].includes(f)) return;
        S.nodes[f].push({id:n.id,type:n.type||'corridor',floor:f,nx:n.nx,ny:n.ny,
          label:n.label||'',roomId:n.roomId||'',...(n.shaftId?{shaftId:n.shaftId}:{})});
      });
      const seen={1:new Set(),2:new Set(),3:new Set()};
      raw.forEach(n=>{
        const f=n.floor; if(![1,2,3].includes(f)) return;
        (n.edges||[]).forEach(nb=>{
          if(floorOf[nb]!==f) return;
          const k=[n.id,nb].sort().join('|');
          if(!seen[f].has(k)){seen[f].add(k);S.edges[f].push([n.id,nb]);}
        });
      });
      syncCtrs();
      S.sel=null; S.edgeStart=null;
      renderNodeList(); renderEdgeList(); redraw();
      st('Imported — '+[1,2,3].map(f=>`${f}F:${S.nodes[f].length}n/${S.edges[f].length}e`).join(' '));
    } catch(err){alert('Parse error: '+err.message);}
  };
  reader.readAsText(file); e.target.value='';
});

// ── Export ─────────────────────────────────────────────────────
$('btn-export').addEventListener('click',()=>{buildExport();showPanel('export');});

$('btn-check-isolated').addEventListener('click',()=>{
  const allNodes = [1,2,3].flatMap(f => S.nodes[f]);
  const isolated = allNodes.filter(n => {
    // Check edges in STATE (not yet exported)
    const floorEdges = S.edges[n.floor] || [];
    const hasEdge = floorEdges.some(([a,b]) => a===n.id || b===n.id);
    return !hasEdge;
  });
  if (!isolated.length) {
    st('No isolated nodes found');
    return;
  }
  // Group by floor
  const byFloor = {1:[],2:[],3:[]};
  isolated.forEach(n => byFloor[n.floor].push(n.id));
  const summary = [1,2,3]
    .filter(f => byFloor[f].length)
    .map(f => `Floor ${f}: ${byFloor[f].join(', ')}`)
    .join('\n');
  st(`Isolated nodes (${isolated.length}): ${isolated.map(n=>n.id).join(', ')}`);
  alert(`${isolated.length} isolated node(s) with no edges:\n\n${summary}`);
});

$('btn-check-dupes').addEventListener('click',()=>{
  const allNodes = [1,2,3].flatMap(f => S.nodes[f]);
  const seen = {};
  const dupes = [];
  allNodes.forEach(n => {
    if (seen[n.id]) dupes.push(n.id);
    else seen[n.id] = true;
  });
  if (dupes.length === 0) {
    st('No duplicate IDs found across all floors');
  } else {
    st(`Duplicate IDs (${dupes.length}): ${dupes.join(', ')}`);
    alert('Duplicate node IDs found:\n\n' + dupes.join('\n') + '\n\nRename them in the node form before exporting.');
  }
});
function dlJson(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type:'application/json'}));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
$('btn-dl-graph').addEventListener('click', () => { buildExport(); dlJson($('export-area').value, 'graph.json'); st('Downloaded graph.json'); });
$('btn-dl-rooms').addEventListener('click', () => { buildExport(); dlJson($('rooms-area').value, 'rooms.json'); st('Downloaded rooms.json'); });

function buildExport() {
  const all=[1,2,3].flatMap(f=>S.nodes[f].map(n=>JSON.parse(JSON.stringify(n))));
  const nm=Object.fromEntries(all.map(n=>[n.id,n]));
  all.forEach(n=>n.edges=[]);
  [1,2,3].forEach(f=>S.edges[f].forEach(([a,b])=>{if(nm[a])nm[a].edges.push(b);if(nm[b])nm[b].edges.push(a);}));
  $('export-area').value=JSON.stringify(all,null,2);
  $('rooms-area').value=JSON.stringify(
    all.filter(n=>n.type==='door'&&n.roomId)
       .map(n=>({id:n.roomId,floor:n.floor,label:n.label||n.roomId,doorNode:n.id,keywords:[n.roomId,n.label].filter(Boolean)})),
    null,2);
}

// ── Auto-connect ───────────────────────────────────────────────
$('btn-autoconnect').addEventListener('click', () => autoConnect());

function autoConnect() {
  const nodes = S.nodes[S.floor];
  if (nodes.length < 2) { st('No nodes to connect'); return; }
  const th = parseFloat($('thresh-cc').value) || 0.04;
  const CORRIDOR_TYPES = new Set(['corridor','stair','elevator','anchor']);
  pushH();
  let added = 0;
  const existing = new Set(S.edges[S.floor].map(([a,b]) => [a,b].sort().join('|')));
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      if (a.type==='door' && b.type==='door') continue;
      if (a.type==='door' || b.type==='door') {
        const other = a.type==='door' ? b : a;
        if (!CORRIDOR_TYPES.has(other.type)) continue;
      }
      const dx=a.nx-b.nx, dy=a.ny-b.ny;
      if (dx*dx+dy*dy > th*th) continue;
      const key=[a.id,b.id].sort().join('|');
      if (!existing.has(key)) { existing.add(key); S.edges[S.floor].push([a.id,b.id]); added++; }
    }
  }
  renderEdgeList(); redraw();
  st(`Auto-connect: +${added} edges (thresh=${th})`);
}

function st(msg){$('status').textContent=msg;}

renderNodeList();
renderEdgeList();
loadFloorImg(1);
</script>
