<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PFT Navigator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="search-row">
      <div id="search-wrap">
        <input id="search-input" type="search" autocomplete="off" autocorrect="off"
               spellcheck="false" placeholder="Room, course, professor…">
        <button id="search-clear" aria-label="Clear">✕</button>
        <div id="results-panel"></div>
      </div>
    </div>

    <div id="floor-tabs">
      <div class="ftab active" data-floor="1">1F</div>
      <div class="ftab" data-floor="2">2F</div>
      <div class="ftab" data-floor="3">3F</div>
    </div>

    <div id="debug-toolbar">
      <label class="debug-toggle">
        <input type="checkbox" id="toggle-nodes" checked>
        Nodes
      </label>
      <label class="debug-toggle">
        <input type="checkbox" id="toggle-edges" checked>
        Edges
      </label>
      <label class="debug-toggle">
        <input type="checkbox" id="toggle-labels" checked>
        Labels
      </label>
      <button id="btn-copy-coords" type="button">Copy coords</button>
      <div id="debug-readout">Click map…</div>
    </div>
  </div>

  <div id="map-area">
    <div id="map-container">
      <img id="map-img" alt="Floor map">
      <canvas id="path-canvas"></canvas>
    </div>
    <div id="crossfloor-banner"></div>
    <div id="no-route">No path found to this room</div>
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading map…</p>
    </div>
  </div>

  <div id="dest-card">
    <div id="dest-card-inner">
      <div id="dest-info">
        <div id="dest-room">—</div>
        <div id="dest-label"></div>
        <div id="dest-floor"></div>
      </div>
      <button id="btn-clear-dest">Clear</button>
    </div>
  </div>

</div>
<script src="apps.js" defer></script>
</body>
</html>
